name: build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          node-version: 24
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm ci
        working-directory: ./website
        
      - run: npm run build
        working-directory: ./website
        
      - run: touch ./website/out/.nojekyll
      
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/out
          cname: sailendra-7.github.io
